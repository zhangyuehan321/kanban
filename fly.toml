# fly launch 后会把 app 名写入此文件，也可手动修改
app = "kanban-api"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  ALLOWED_ORIGINS = "https://zhangyuehan321.github.io,http://localhost:5173"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
